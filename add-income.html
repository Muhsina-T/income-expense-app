<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Income</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <div class="form-container">

        <a href="dashboard.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </a>

        <div class="form-title">
            <h2>Add Income</h2>
        </div>

        <form id="incomeForm">

            <label>Amount</label>
            <input
                type="number"
                id="amount"
                placeholder="Enter amount"
                required>

            <label>Payment Mode</label>

            <div class="radio-group">

                <label>
                    <input
                        type="radio"
                        name="payment"
                        value="Cash"
                        checked>

                    Cash
                </label>

                <label>
                    <input
                        type="radio"
                        name="payment"
                        value="Online">

                    Online
                </label>

            </div>

            <label>Description</label>

            <textarea
                id="description"
                placeholder="Enter description"
                maxlength="200"></textarea>

            <p id="descriptionCount">0 / 200 Characters</p>

            <label>Date</label>

            <input
                type="date"
                id="date"
                required>

            <label>Attach File</label>

            <input
                type="file"
                id="attachment">
            <p id="fileNameDisplay">No file selected</p>

            <button
                type="submit"
                class="save-btn">

                Save Income

            </button>

        </form>

    </div>

    <script type="module" src="income.js"></script>

</body>

</html>
